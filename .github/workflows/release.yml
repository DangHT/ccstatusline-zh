name: Release

# main 上 package.json 版本号变化时触发（sync PR 合并即是）。
# 若版本比 npm 上的新，则构建并发布到 npm，再打 tag、开 GitHub Release。
#
# publish 任务挂在受保护的 `npm-publish` Environment 上：
# 配置了「必需审批人」后，这一步会暂停并通知你，点一下批准才会真正发布。
#
# 需要的仓库配置：
#   - Secret  NPM_TOKEN  —— npm automation token（automation 类型可绕过 2FA-OTP）
#   - Settings → Environments → 新建 `npm-publish`，加 Required reviewers（你自己）

on:
  push:
    branches: [main]
    paths: ['package.json']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.v.outputs.should_publish }}
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Compare package.json version with npm
        id: v
        run: |
          LOCAL=$(jq -r .version package.json)
          NPM=$(npm view ccstatusline-zh version 2>/dev/null || echo '0.0.0')
          echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" != "$NPM" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "📦 本地 $LOCAL ≠ npm $NPM —— 待发布"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "✅ npm 已是 $NPM —— 无需发布"
          fi

  publish:
    needs: check
    if: needs.check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    # 受保护 Environment —— 配了必需审批人后，这里会暂停等你批准
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ needs.check.outputs.version }}"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "tag $VERSION 已存在，跳过打 tag"
          else
            git tag "$VERSION"
            git push origin "$VERSION"
          fi
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "release $VERSION 已存在，跳过"
          else
            gh release create "$VERSION" \
              --title "$VERSION — 同步上游 ccstatusline" \
              --generate-notes
          fi
