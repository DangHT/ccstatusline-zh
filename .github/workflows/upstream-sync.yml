name: Upstream auto-sync

# 每日扫描上游 sirmalloc/ccstatusline 最新 release。发现新版本时，自动跑
# headless Claude Code 完成「cherry-pick 增量 + 中文化 + 自测 + 开 PR」，
# 并对 PR 开启 auto-merge（CI 绿后自动合并）。
#
# Claude 遇到无法自信解决的大冲突时，不会硬合，而是开一个 issue 通知后停止。
# 合并后由 release.yml 负责发布（npm publish 前有一道人工审批 gate）。
#
# 需要的仓库配置：
#   - Secret  CLAUDE_CODE_OAUTH_TOKEN  —— headless Claude Code 鉴权
#     （本地 `claude setup-token` 用 Pro/Max 订阅生成，无需 API 付费额度）
#   - Settings → General → 勾选 "Allow auto-merge"
#   - main 分支保护：要求 Build / Lint & Type Check / Test 三个 check 通过
#     （否则 auto-merge 会在 CI 出结果前就直接合）

on:
  schedule:
    # 每天 UTC 01:00 = 北京时间 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: '强制同步到指定上游 tag（留空＝自动取 latest）'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      needs_sync: ${{ steps.diff.outputs.needs_sync }}
      tag: ${{ steps.upstream.outputs.tag }}
      fork_version: ${{ steps.fork.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve fork version
        id: fork
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Resolve upstream latest release
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(gh api repos/sirmalloc/ccstatusline/releases/latest --jq .tag_name)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Determine if sync needed
        id: diff
        run: |
          FORK="v${{ steps.fork.outputs.version }}"
          UP="${{ steps.upstream.outputs.tag }}"
          if [ "$FORK" = "$UP" ]; then
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
            echo "✅ Fork 已是最新（$FORK）"
          else
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  Fork $FORK，上游 $UP —— 需要同步"
          fi

  sync:
    needs: detect
    if: needs.detect.outputs.needs_sync == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git + upstream remote
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git remote add upstream https://github.com/sirmalloc/ccstatusline.git || true
          git fetch upstream --tags

      - uses: oven-sh/setup-bun@v2

      - name: Run Claude Code sync
        uses: anthropic/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: '--allowedTools Bash,Read,Edit,Write,Grep,Glob'
          prompt: |
            上游 sirmalloc/ccstatusline 发布了新版本 ${{ needs.detect.outputs.tag }}，
            当前 fork 在 v${{ needs.detect.outputs.fork_version }}。请完成自动同步。

            严格参照仓库内 `.claude/commands/sync-upstream.md` 的流程与术语表，要点：

            1. upstream remote 已配置并 fetch 完成。**用 git cherry-pick 取增量**，
               不要用 jj rebase —— 本 fork 是「每次 squash 一个 sync 提交」的历史，
               jj rebase 会产生大量虚假冲突。
               先定位 fork 上次同步到的上游 commit：fork 的 package.json version
               对应某个上游版本，在 `upstream/main` 历史里按 package.json version
               找到那个 commit 作为 cherry-pick 起点。
            2. `git cherry-pick <起点>..${{ needs.detect.outputs.tag }}` 取增量。
            3. 解冲突：保留 fork 的中文化，新出现的英文按术语表翻译；
               package.json 保留 `ccstatusline-zh` 名称只取版本号。
            4. 中文化所有新增的用户可见字符串（组件名/描述/菜单/提示/校验信息），
               type ID、config 键名、文件路径保持英文。
            5. 跑 `bun install && bun run lint`，再用
               `env -u HTTPS_PROXY -u HTTP_PROXY -u ALL_PROXY -u https_proxy -u http_proxy -u all_proxy bun test`，
               两者必须全绿；测试断言里的英文文案同步翻成中文。
            6. 更新 README：同步版本号、组件数、功能列项。
            7. 新建分支 `sync/upstream-<YYYY-MM-DD>`，提交（消息用
               `feat: 同步上游 ccstatusline ${{ needs.detect.outputs.tag }} 并完成中文化`），
               push 到 origin，用 `gh pr create --base main` 开 PR，
               再 `gh pr merge --auto --squash` 开启自动合并。
            8. **不要自己 merge PR，不要 npm publish。**

            如果遇到上游大规模重构、冲突无法自信解决：不要硬合，
            用 `gh issue create --label upstream-sync` 开 issue 描述 diff 摘要后停止。
